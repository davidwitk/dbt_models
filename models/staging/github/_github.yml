sources:
  - name: s3
    config:
      freshness:
        error_after: {count: 24, period: hour}
    tables:
      - name: raw_github_commits
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/github_data/commits.csv', header=True)"
        loaded_at_field: _extracted_at
        columns:
          - name: sha
            data_tests:
              - not_null
              - unique
          - name: pull_requests
            columns:
              - name: id
                data_tests:
                  - not_null
                  - unique
          - name: repositories
            columns:
              - name: id
                data_tests:
                  - not_null
                  - unique
      - name: raw_github_prs
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/github_data/prs.csv', header=True)"
        loaded_at_field: _extracted_at
      - name: raw_github_repos
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/github_data/repos.csv', header=True)"
        loaded_at_field: _extracted_at
