sources:
  - name: s3
    config:
      freshness:
        error_after: {count: 7, period: day}
    loaded_at_field: "_extracted_at :: timestamp"
    tables:
      - name: raw_mubi_top_movies
        config:
          meta:
            external_location: "read_parquet('s3://data-lake-chodera/mubi_data/top_movies/*.parquet')"
        columns:
          - name: _sdc_id
            data_tests:
              - not_null
              - unique
      - name: raw_mubi_top_movies_details
        config:
          meta:
            external_location: "read_parquet('s3://data-lake-chodera/mubi_data/top_movies_details/*.parquet')"
        columns:
          - name: _sdc_id
            data_tests:
              - not_null
              - unique
        data_tests:
          - dbt_utils.equal_rowcount:
              arguments:
                compare_model: source('s3', 'raw_mubi_top_movies')

models:
  - name: stg_mubi_top_movies
    columns:
      - name: movie_week_id
        data_tests:
          - not_null
          - unique
  - name: stg_mubi_top_movies_details
    columns:
      - name: movie_week_id
        data_tests:
          - not_null
          - unique
