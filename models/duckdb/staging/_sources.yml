sources:
  - name: s3
    config:
      freshness:
        error_after: {count: 24, period: hour}
    tables:
      - name: raw_github_commits
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/github_data/commits.csv', header=True)"
        loaded_at_field: _extracted_at
        columns:
          - name: sha
            data_tests:
              - not_null
              - unique
          - name: pull_requests
            columns:
              - name: id
                data_tests:
                  - not_null
                  - unique
          - name: repositories
            columns:
              - name: id
                data_tests:
                  - not_null
                  - unique
      - name: raw_github_prs
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/github_data/prs.csv', header=True)"
        loaded_at_field: _extracted_at
      - name: raw_github_repos
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/github_data/repos.csv', header=True)"
        loaded_at_field: _extracted_at
      - name: raw_imdb_top_250
        config:
          meta:
            external_location: "read_parquet('s3://data-lake-chodera/imdb_data/imdb_top_250/*.parquet', union_by_name=True)"
        loaded_at_field: "extracted_at :: timestamp"
        columns:
          - name: id || rank
            data_tests:
              - not_null
              - unique      
      - name: raw_letterboxd_diary
        config:
          meta:
            external_location: "read_csv('s3://data-lake-chodera/letterboxd_data/diary.csv', header=True)"
          freshness: null

      - name: raw_s3_file_inventory
        config:
          meta:
            external_location: "read_parquet('s3://data-lake-chodera/s3_data/file_inventory/*.parquet')"
          freshness: null
