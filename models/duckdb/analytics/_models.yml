models:
  - name: fact_imdb
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: title
        data_tests:
          - not_null
          - unique:
              arguments:
                where: is_latest_day

  - name: dim_dates
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
